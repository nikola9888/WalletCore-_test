name: WalletCore APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    container:
      image: kivy/buildozer:latest

    env:
      ACCEPT_ANDROID_SDK_LICENSE: "yes"

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        pip install --upgrade pip
        pip install buildozer==1.6.0
        pip install Cython==0.29.37
        pip install sh==1.14.3

    - name: Prepare
      run: |
        chmod -R 777 .
        rm -rf .buildozer
        rm -rf bin

    - name: Build APK
      run: |
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WalletCore-debug
        path: bin/*.apk